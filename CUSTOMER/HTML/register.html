<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng Ký Thành Viên - Khách Sạn</title>
  <link rel="stylesheet" href="/CUSTOMER/CSS/login_register.css">
</head>
<body>

<div class="auth-container">
  <div class="auth-header">
    <h2>Đăng Ký</h2>
  </div>

  <form action="#" method="POST">
    <div class="input-group">
      <label for="fullname">Họ và tên</label>
      <input type="text" id="fullname" name="fullname" placeholder="Ví dụ: Nguyễn Văn A" required>
    </div>

    <div class="input-group">
      <label for="phone">Số điện thoại</label>
      <input type="tel" id="phone" name="phone" placeholder="Nhập số điện thoại..." required>
    </div>

    <div class="input-group">
      <label for="email">Địa chỉ Email</label>
      <input type="email" id="email" name="email" placeholder="Nhập email của bạn..." required>
    </div>

    <div class="input-group">
      <label for="password">Mật khẩu</label>
      <input type="password" id="password" name="password" placeholder="Nhập mật khẩu..." required>
    </div>

    <div class="input-group">
      <label for="re-password">Xác nhận mật khẩu</label>
      <input type="password" id="re-password" name="re-password" placeholder="Nhập lại mật khẩu..." required>
    </div>

    <div class="auth-utils">
      <label><input type="checkbox" required> Tôi đồng ý với các điều khoản của khách sạn</label>
    </div>

    <button type="submit" class="btn-auth">ĐĂNG KÝ TÀI KHOẢN</button>
  </form>

  <div class="switch-auth-link">
    Đã có tài khoản? <a href="../../index.html">Đăng nhập</a>
  </div>
</div>

</body>
</html>
