<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thông Tin Cá Nhân</title>
    <link rel="stylesheet" href="../CSS/profile.css">
</head>
<body>

<header class="main-header">
    <div class="logo">TEAM 12</div>
    <nav class="nav-menu">
        <a href="home.html">Trang chủ</a>
        <a href="history.html">Lịch sử đặt phòng</a>
        <a href="profile.html" class="pro">Thông tin cá nhân</a>
        <div class="dropdown">
            <button class="dropbtn">Quản lý ▾</button>
            <div class="dropdown-content">
                <a href="receptionist_checkin.html">🔑 Trang Lễ Tân</a>
                <a href="admin_room.html">⚙️ Trang Admin</a>
            </div>
        </div>
        <a href="../index.html" class="btn-logout">Đăng xuất</a>
    </nav>
</header>

<main class="profile-container">
    <a href="home.html" class="btn-back">← Quay lại trang trước</a>
    <h1 class="page-title">Tài khoản của tôi</h1>
    <div class="profile-layout">
        <section class="profile-card">
            <h2>Cập nhật thông tin cá nhân</h2>
            <form id="form-profile">
                <div class="form-group">
                    <label for="profile-name">Họ và tên</label>
                    <input type="text" id="profile-name" value="Nguyễn Văn A" required>
                </div>
                <div class="form-group">
                    <label for="profile-phone">Số điện thoại</label>
                    <input type="tel" id="profile-phone" value="0901234567" required>
                </div>
                <div class="form-group">
                    <label for="profile-email">Địa chỉ Email</label>
                    <input type="email" id="profile-email" value="nguyenvana@gmail.com" required>
                </div>
                <button type="submit" class="btn-save">LƯU THAY ĐỔI</button>
            </form>
        </section>

        <section class="profile-card">
            <h2>Đổi mật khẩu</h2>
            <form id="form-password">
                <div class="form-group">
                    <label for="old-pass">Mật khẩu hiện tại</label>
                    <input type="password" id="old-pass" placeholder="••••••••" required>
                </div>
                <div class="form-group">
                    <label for="new-pass">Mật khẩu mới</label>
                    <input type="password" id="new-pass" placeholder="Nhập mật khẩu mới..." required>
                </div>
                <div class="form-group">
                    <label for="re-new-pass">Xác nhận mật khẩu mới</label>
                    <input type="password" id="re-new-pass" placeholder="Nhập lại mật khẩu mới..." required>
                </div>
                <button type="submit" class="btn-save btn-dark">ĐỔI MẬT KHẨU</button>
            </form>
        </section>
    </div>
</main>

</body>
</html>
