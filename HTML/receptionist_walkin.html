<aside class="sidebar">
  <div class="sidebar-brand">LỄ TÂN</div>
  <ul class="sidebar-menu">
    <a href="receptionist_checkin.html" class="sidebar-item"> Thủ tục Check-in</a>
    <a href="receptionist_checkout.html" class="sidebar-item">Thủ tục Check-out</a>
    <a href="receptionist_search.html" class="sidebar-item"> Tra cứu & Xem đơn đặt</a>
    <a href="receptionist_room_status.html" class="sidebar-item"> Giám sát trạng thái phòng</a>

  </ul>
  <div class="sidebar-footer"><a href="../index.html" class="btn-logout-sidebar"> Đăng xuất </a></div>

<main class="main-content">
  <div class="content-header"><h1>Đặt Phòng Trực Tiếp Tại Quầy Lễ Tân </h1></div>
  <div class="data-section">
    <h2 style="margin-bottom: 20px;">Tạo đơn đặt phòng trực tiếp gi</h2>
    <form onsubmit="alert('Tạo đơn hàng walk-in trực tiếp thành công!'); return false;">
      <div class="form-grid">
        <div class="form-group"><label>Họ tên khách hàng</label><input type="text" required placeholder="Nguyễn Văn B"></div>
        <div class="form-group"><label>Số điện thoại liên hệ</label><input type="tel" required placeholder="0987xxxxxx"></div>
        <div class="form-group">
          <label>Chọn hạng phòng trống hiện tại</label>
          <select><option>Standard Double (Còn 8 phòng)</option><option>Deluxe Ocean View (Còn 3 phòng)</option></select>
        </div>
        <div class="form-group"><label>Số đêm lưu trú</label><input type="number" value="1" min="1"></div>
      </div>
      <button type="submit" class="btn-primary" style="margin-top: 15px;">Tạo Đơn & Thu Tiền Trực Tiếp</button>
    </form>
  </div>
</main>
</body>
</html>
