<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập - Hệ Thống Khách Sạn</title>
    <link rel="stylesheet" href="/CUSTOMER/CSS/login_register.css">
    <script src="/CUSTOMER/JS/login.js" defer></script>
</head>
<body>

<div class="auth-container">
    <div class="auth-header">
        <h2>Đăng Nhập</h2>
    </div>

    <form action="#" method="POST">
        <div class="input-group">
            <label for="username">Tên đăng nhập / Email</label>
            <input type="text" id="username" name="username" placeholder="Nhập tài khoản hoặc email của bạn..." required>
        </div>

        <div class="input-group">
            <label for="password">Mật khẩu</label>
            <input type="password" id="password" name="password" placeholder="Nhập mật khẩu..." required>
        </div>

        <div class="auth-utils">
            <label><input type="checkbox"> Ghi nhớ đăng nhập</label>
            <a href="#" class="forgot-pass">Quên mật khẩu?</a>
        </div>

        <button type="submit" class="btn-auth">ĐĂNG NHẬP</button>
    </form>

    <div class="switch-auth-link">
        Chưa có tài khoản? <a href="CUSTOMER/HTML/register.html">Đăng ký tài khoản</a>
    </div>
</div>

</body>
</html>
